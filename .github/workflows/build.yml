name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libwayland-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload luacad binary
        uses: actions/upload-artifact@v4
        with:
          name: luacad-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/luacad
            target/${{ matrix.target }}/release/luacad.exe

      - name: Upload luacad-studio binary
        uses: actions/upload-artifact@v4
        with:
          name: luacad-studio-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/luacad-studio
            target/${{ matrix.target }}/release/luacad-studio.exe
